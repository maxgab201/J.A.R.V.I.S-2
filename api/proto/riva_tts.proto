// SPDX-License-Identifier: MIT
// Proto self-contained para Riva TTS — combina riva_tts + riva_audio + riva_common
// (eliminamos los imports para que loadSync no requiera múltiples archivos)

syntax = "proto3";

package nvidia.riva.tts;

enum AudioEncoding {
  ENCODING_UNSPECIFIED = 0;
  LINEAR_PCM = 1;
  FLAC = 2;
  MULAW = 3;
  ALAW = 4;
  OGGOPUS = 5;
}

message RequestId {
  string value = 1;
}

message SynthesizeSpeechRequest {
  string text = 1;
  string language_code = 2;
  AudioEncoding encoding = 3;
  int32 sample_rate_hz = 4;
  string voice_name = 5;
  // ZeroShot/dict ignorados — basta con los 5 anteriores para Magpie multilingual
  RequestId id = 100;
}

message SynthesizeSpeechResponseMetadata {
  string text = 1;
  string processed_text = 2;
  repeated float predicted_durations = 8;
}

message SynthesizeSpeechResponse {
  bytes audio = 1;
  SynthesizeSpeechResponseMetadata meta = 2;
  RequestId id = 100;
}

service RivaSpeechSynthesis {
  rpc Synthesize(SynthesizeSpeechRequest) returns (SynthesizeSpeechResponse) {}
}
